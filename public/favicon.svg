<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="saxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C41E3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6F47;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#FFFFFF"/>

  <!-- Saxophone Body -->
  <g transform="translate(50, 50)">
    <!-- Bell -->
    <path d="M -5 20 Q -8 26 -6 33 Q 0 36 6 33 Q 8 26 5 20 Z" fill="url(#saxGradient)" stroke="#1A1A1A" stroke-width="1"/>

    <!-- Lower Stack -->
    <circle cx="-4" cy="14" r="3" fill="url(#saxGradient)" stroke="#1A1A1A" stroke-width="0.8"/>
    <circle cx="4" cy="14" r="3" fill="url(#saxGradient)" stroke="#1A1A1A" stroke-width="0.8"/>

    <!-- Middle Section -->
    <rect x="-6" y="4" width="12" height="10" rx="2" fill="url(#saxGradient)" stroke="#1A1A1A" stroke-width="0.8"/>

    <!-- Keys -->
    <circle cx="-8" cy="7" r="2" fill="#D4AF37" stroke="#1A1A1A" stroke-width="0.6"/>
    <circle cx="8" cy="7" r="2" fill="#D4AF37" stroke="#1A1A1A" stroke-width="0.6"/>
    <circle cx="-8" cy="12" r="2" fill="#D4AF37" stroke="#1A1A1A" stroke-width="0.6"/>
    <circle cx="8" cy="12" r="2" fill="#D4AF37" stroke="#1A1A1A" stroke-width="0.6"/>

    <!-- Upper Tube -->
    <path d="M -4 4 Q -4 -5 0 -14" fill="none" stroke="url(#saxGradient)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Mouthpiece -->
    <rect x="-1.5" y="-16" width="3" height="4" rx="0.5" fill="url(#saxGradient)" stroke="#1A1A1A" stroke-width="0.6"/>
    <circle cx="0" cy="-18" r="1.2" fill="#C41E3A" stroke="#1A1A1A" stroke-width="0.6"/>

    <!-- Reed -->
    <path d="M 0 -15 L 0.8 -17" stroke="#8B6F47" stroke-width="0.7" stroke-linecap="round"/>
  </g>

  <!-- Border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.4"/>
</svg>